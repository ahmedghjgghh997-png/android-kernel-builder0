name: Download from TransferNow with CLI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install transfernow-cli
        run: |
          npm install -g transfernow-cli

      - name: Download kernel source using transfernow-cli
        run: |
          # الرابط الذي أرسلته
          LINK="https://www.transfernow.net/d/start?utm_source=20260404qiVcnOr0&utm_term=i4o4au"
          # استخراج معرف الملف (code)
          CODE=$(echo "$LINK" | grep -oP 'utm_source=\K[^&]+')
          echo "Code: $CODE"
          # استخدام الأداة للتنزيل
          transfernow download $CODE -o kernel_source.tar.gz
          # التحقق من الحجم
          ls -lh kernel_source.tar.gz
          tar -xzf kernel_source.tar.gz

      - name: Setup toolchain (Proton Clang)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Integrate SukiSU Ultra
        working-directory: ./kernel_source
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -

      - name: Build kernel
        working-directory: ./kernel_source
        run: |
          export ARCH=arm64
          export ANDROID_MAJOR_VERSION=t
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export HOSTCC=gcc
          export HOSTLD=ld
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          make exynos1380_a35x_defconfig
          make -j$(nproc)

      - name: Upload Image.gz
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-A35-SukiSU
          path: kernel_source/arch/arm64/boot/Image.gz
