name: Build A35 Kernel with SukiSU Ultra (Final Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: raspiduino/sm-a356e-kernel
          path: kernel

      - name: Setup Proton Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Integrate SukiSU Ultra
        working-directory: ./kernel
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -

      - name: Build kernel
        working-directory: ./kernel
        run: |
          export ARCH=arm64
          export ANDROID_MAJOR_VERSION=t
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export HOSTLDFLAGS="-fuse-ld=lld"
          export LLVM=1
          export LLVM_IAS=1
          make O=out exynos1380_a35x_defconfig
          make -j$(nproc) O=out
      - name: Upload Image.gz
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-A35-SukiSU
          path: kernel/out/arch/arm64/boot/Image.gz
