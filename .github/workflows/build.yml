name: Build Kernel with Extraction (Skip Conflicts)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download kernel source
        run: |
          wget -O kernel.tar.gz "https://www.transfernow.net/dl/20260404qiVcnOr0"
          SIZE=$(stat -c%s kernel.tar.gz)
          echo "Size: $SIZE bytes"
          if [ $SIZE -lt 100000000 ]; then
            echo "File too small, aborting"
            exit 1
          fi

      - name: Extract kernel source (clean start)
        run: |
          # حذف المجلد القديم لتجنب أي تعارض
          rm -rf kernel_source
          mkdir kernel_source
          # فك الضغط مع تجاهل الملفات الموجودة (إذا وجدت)
          tar -xzf kernel.tar.gz -C kernel_source --skip-old-files 2>/dev/null || tar -xzf kernel.tar.gz -C kernel_source --overwrite
          # إذا كان هناك مجلد فرعي واحد، انقل محتوياته
          if [ -d kernel_source/kernel ]; then
            mv kernel_source/kernel/* kernel_source/
            rmdir kernel_source/kernel
          fi
          echo "Extraction done. Contents:"
          ls -la kernel_source/ | head -20

      - name: Setup toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Integrate SukiSU Ultra
        working-directory: ./kernel_source
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -

      - name: Build kernel
        working-directory: ./kernel_source
        run: |
          export ARCH=arm64
          export ANDROID_MAJOR_VERSION=t
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export HOSTCC=gcc
          export HOSTLD=ld
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          make exynos1380_a35x_defconfig
          make -j$(nproc)

      - name: Upload Image.gz
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-A35
          path: kernel_source/arch/arm64/boot/Image.gz
