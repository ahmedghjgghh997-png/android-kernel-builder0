name: Build Kernel from Extracted Source

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download compressed kernel source
        run: |
          wget -O kernel.tar.gz "https://www.transfernow.net/dl/20260404qiVcnOr0"

      - name: Extract kernel source (crucial step)
        run: |
          mkdir kernel_source
          tar -xzf kernel.tar.gz -C kernel_source
          # بعد فك الضغط، قد يكون هناك مجلد واحد بداخله. ننقل محتوياته للأعلى.
          if [ -d kernel_source/kernel ]; then
            mv kernel_source/kernel/* kernel_source/
            rm -rf kernel_source/kernel
          fi

      - name: Setup toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Integrate SukiSU Ultra
        working-directory: ./kernel_source
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -

      - name: Build kernel
        working-directory: ./kernel_source
        run: |
          export ARCH=arm64
          export ANDROID_MAJOR_VERSION=t
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export HOSTCC=gcc
          export HOSTLD=ld
          export CC=clang
          export LD=ld.lld
          export LLVM=1
          export LLVM_IAS=1
          make exynos1380_a35x_defconfig
          make -j$(nproc)

      - name: Upload Image.gz
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-A35
          path: kernel_source/arch/arm64/boot/Image.gz
