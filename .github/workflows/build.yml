- name: Download kernel source from TransferNow (fixed)
  run: |
    URL="https://www.transfernow.net/d/start?utm_source=20260404qiVcnOr0&utm_term=i4o4au"
    # استخدام curl مع محاكاة متصفح
    curl -L -b cookies.txt -c cookies.txt \
         -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
         -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
         -H "Accept-Language: en-US,en;q=0.5" \
         -H "Referer: https://www.transfernow.net/" \
         --compressed \
         -o kernel_source.tar.gz \
         "$URL"
    
    # التحقق من الحجم
    SIZE=$(stat -c%s kernel_source.tar.gz)
    echo "Downloaded size: $SIZE bytes"
    
    # إذا كان الحجم أقل من 1 ميجابايت، حاول استخراج الرابط الحقيقي
    if [ $SIZE -lt 1000000 ]; then
      echo "Small file detected, attempting to extract real download URL..."
      REAL_URL=$(grep -oP 'https://download\.transfernow\.net/[^"\047]+' kernel_source.tar.gz | head -1)
      if [ -n "$REAL_URL" ]; then
        echo "Real URL found: $REAL_URL"
        wget -O kernel_source.tar.gz "$REAL_URL"
      else
        echo "No real URL found. The file may be behind a click wall."
        exit 1
      fi
    fi
    
    tar -xzf kernel_source.tar.gz
